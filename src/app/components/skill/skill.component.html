<swiper-container #skillsSwiper init="false" class="skills-swiper" aria-label="Continuously scrolling skills">
  <swiper-slide *ngFor="let skill of skills">
    <div class="skill">
      <img class="skill-icon" [src]="skill.icon" [alt]="''" loading="lazy">
      <span>{{ skill.name }}</span>
    </div>
  </swiper-slide>
</swiper-container>
