<article class="project-card">
  @if (project.githubUrl) {
    <a class="card-link" [href]="project.githubUrl" target="_blank" rel="noopener noreferrer" [attr.aria-label]="'Open ' + project.name + ' source code'"></a>
  }
  <div class="preview-wrap">
    <img class="project-preview" [src]="project.image" [alt]="project.name + ' preview'" loading="lazy">
  </div>
  <div class="project-content">
    <div class="project-title">
      <h2>{{ project.name }}</h2>
      @if (project.githubUrl) { <span aria-hidden="true">↗</span> }
    </div>
    <p class="project-desc">{{ project.description }}</p>
    <div class="project-links">
      <a *ngFor="let link of project.otherUrls" [href]="link.url" target="_blank" rel="noopener noreferrer">{{ link.title }} ↗</a>
    </div>
    <ul class="technologies" aria-label="Technologies used">
      <li *ngFor="let tech of project.technologies">{{ tech.name }}</li>
    </ul>
  </div>
</article>
