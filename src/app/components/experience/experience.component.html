<article class="experience-card">
  <a class="card-link" [href]="exp.website" target="_blank" rel="noopener noreferrer" [attr.aria-label]="'Visit ' + exp.company"></a>
  <div class="period">{{ exp.startDate }} — {{ exp.endDate }}</div>
  <div class="experience-main">
    <div class="title-row">
      <div>
        <h2>{{ exp.title }}</h2>
        <p>{{ exp.company }} · {{ exp.location }}</p>
      </div>
      <span aria-hidden="true">↗</span>
    </div>
    <p class="description">{{ exp.description }}</p>
    <ul class="technologies" aria-label="Skills and technologies">
      <li *ngFor="let tech of exp.technologies">{{ tech.name }}</li>
    </ul>
  </div>
</article>
